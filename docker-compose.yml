# Frontend + backend. O Postgres local fica no profile `local-db` para nao
# subir quando DATABASE_URL aponta para Supabase.
#
# Supabase:
#   docker compose up --build backend frontend
#
# Banco local:
#   docker compose --profile local-db up --build

services:
  db:
    image: postgres:16
    container_name: sedu-db
    profiles: ["local-db"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: seduc
    ports:
      - "5432:5432"
    volumes:
      - sedu_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d seduc"]
      interval: 5s
      timeout: 3s
      retries: 12

  backend:
    build: ./backend
    container_name: sedu-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/seduc}
      SEDU_JWT_SECRET: ${SEDU_JWT_SECRET:-dev-local-trocar-em-producao}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sedu-frontend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  sedu_pgdata:
